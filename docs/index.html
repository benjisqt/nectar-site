<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nectar</title>
  <link rel="stylesheet" href="assets/style.css" />
</head>
<body>
  <canvas id="bg"></canvas>
  <main>
    <img src="assets/icon.png" alt="Nectar icon" class="icon" />
    <h1>Nectar</h1>
    <p class="status">Coming soon.</p>
    <p class="status">By benjisqt.</p>
    <div class="links">
      <a href="source.json">AltSource</a>
    </div>
  </main>
  <script>
    const canvas = document.getElementById('bg');
    const ctx = canvas.getContext('2d');

    function resize() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    const orbs = [
      { x: 0.2, y: 0.3, r: 0.5, vx: 0.0003, vy: 0.0002, color: '180, 60, 0' },
      { x: 0.7, y: 0.6, r: 0.55, vx: -0.0002, vy: 0.0003, color: '140, 40, 0' },
      { x: 0.5, y: 0.1, r: 0.45, vx: 0.0001, vy: -0.0002, color: '210, 80, 10' },
      { x: 0.1, y: 0.8, r: 0.4, vx: 0.0002, vy: -0.0003, color: '100, 30, 0' },
    ];

    function draw(t) {
      const w = canvas.width, h = canvas.height;
      ctx.fillStyle = '#1a0800';
      ctx.fillRect(0, 0, w, h);

      for (const orb of orbs) {
        orb.x += orb.vx * Math.sin(t * 0.0005 + orb.r);
        orb.y += orb.vy * Math.cos(t * 0.0004 + orb.r);

        if (orb.x < 0 || orb.x > 1) orb.vx *= -1;
        if (orb.y < 0 || orb.y > 1) orb.vy *= -1;

        const grd = ctx.createRadialGradient(
          orb.x * w, orb.y * h, 0,
          orb.x * w, orb.y * h, orb.r * Math.max(w, h)
        );
        grd.addColorStop(0, `rgba(${orb.color}, 0.6)`);
        grd.addColorStop(1, `rgba(${orb.color}, 0)`);

        ctx.fillStyle = grd;
        ctx.fillRect(0, 0, w, h);
      }

      requestAnimationFrame(draw);
    }

    requestAnimationFrame(draw);
  </script>
</body>
</html>
